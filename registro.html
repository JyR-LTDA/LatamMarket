<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - LatamMarket</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--gray-light);">

    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html">
                <img src="logo.jpg" alt="LatamMarket Logo" style="height: 60px; border-radius: 8px;">
            </a>
        </div>
        
        <h2>Crear una Cuenta</h2>
        
        <button class="auth-google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" style="width: 20px;">
            Continuar con Google
        </button>

        <div style="text-align: center; margin: 1.5rem 0; color: var(--text-light); font-size: 0.9rem;">
            o regístrate con tu correo
        </div>

        <form action="index.html" onsubmit="alert('Esta es una demostración visual. En la Fase 2 conectaremos esto a la Base de Datos de Firebase.'); return false;">
            <div class="form-group">
                <label for="name">Nombre completo</label>
                <input type="text" id="name" placeholder="Ej. Juan Pérez" required>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Crea una contraseña segura" required>
            </div>
            
            <button type="submit" class="auth-btn">Registrarme</button>
        </form>

        <div class="auth-links">
            ¿Ya tienes cuenta? <a href="#">Inicia sesión aquí</a><br><br>
            <a href="index.html" style="color: var(--text-light); text-decoration: underline;">Volver a la tienda</a>
        </div>
    </div>

</body>
</html>
